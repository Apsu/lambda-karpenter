apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lambdanodeclasses.karpenter.lambda.cloud
spec:
  group: karpenter.lambda.cloud
  scope: Cluster
  names:
    kind: LambdaNodeClass
    plural: lambdanodeclasses
    singular: lambdanodeclass
    shortNames:
      - lnc
    categories:
      - karpenter
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Region
          type: string
          jsonPath: .spec.region
        - name: InstanceType
          type: string
          jsonPath: .spec.instanceType
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - region
                - instanceType
              properties:
                region:
                  type: string
                  minLength: 1
                instanceType:
                  type: string
                  minLength: 1
                instanceTypeSelector:
                  type: array
                  items:
                    type: string
                image:
                  type: object
                  properties:
                    id:
                      type: string
                    family:
                      type: string
                sshKeyNames:
                  type: array
                  items:
                    type: string
                publicIP:
                  type: boolean
                pool:
                  type: string
                firewallRulesetIDs:
                  type: array
                  items:
                    type: string
                tags:
                  type: object
                  additionalProperties:
                    type: string
                userData:
                  type: string
            status:
              type: object
              properties:
                resolvedImageID:
                  type: string
                resolvedImageFamily:
                  type: string
                lastValidatedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      reason:
                        type: string
                        maxLength: 1024
                      message:
                        type: string
                        maxLength: 32768
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
      subresources:
        status: {}
