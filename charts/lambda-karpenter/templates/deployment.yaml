apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lambda-karpenter.fullname" . }}
  labels:
    {{- include "lambda-karpenter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "lambda-karpenter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lambda-karpenter.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lambda-karpenter.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PROVIDER_CLUSTER_NAME
              value: {{ required "config.clusterName is required" .Values.config.clusterName | quote }}
            - name: LAMBDA_API_BASE_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
            - name: LAMBDA_API_RPS
              value: {{ .Values.config.apiRps | quote }}
            - name: LAMBDA_LAUNCH_MIN_INTERVAL_SECONDS
              value: {{ .Values.config.launchMinIntervalSeconds | quote }}
            - name: INSTANCE_TYPE_CACHE_TTL
              value: {{ .Values.config.instanceTypeCacheTtl | quote }}
            - name: FEATURE_GATES
              value: {{ .Values.config.featureGates | quote }}
            - name: LAMBDA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "config.apiTokenSecret.name is required" .Values.config.apiTokenSecret.name | quote }}
                  key: {{ .Values.config.apiTokenSecret.key | quote }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
