{{- if .Values.pdb.create -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lambda-karpenter.fullname" . }}
  labels:
    {{- include "lambda-karpenter.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "lambda-karpenter.selectorLabels" . | nindent 6 }}
{{- end -}}
