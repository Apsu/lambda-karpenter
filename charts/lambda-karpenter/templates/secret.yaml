{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lambda-karpenter.fullname" . }}-api-token
  labels:
    {{- include "lambda-karpenter.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.config.apiTokenSecret.key }}: {{ required "secret.token is required when secret.create=true" .Values.secret.token | b64enc | quote }}
{{- end }}
