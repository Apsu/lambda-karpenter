nameOverride: ""
fullnameOverride: ""

image:
  repository: apsu/lambda-karpenter
  tag: "v0.4.1"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

pdb:
  create: true
  maxUnavailable: 1

resources: {}

nodeSelector: {}

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

affinity: {}

config:
  clusterName: ""
  apiTokenSecret:
    name: ""
    key: "token"
  apiBaseUrl: "https://cloud.lambda.ai"
  apiRps: 1
  launchMinIntervalSeconds: 5
  instanceTypeCacheTtl: 10m
  featureGates: "NodeRepair=false,ReservedCapacity=true,SpotToSpotConsolidation=false,NodeOverlay=false,StaticCapacity=false"

extraEnv: []

# Cluster join configuration (used by default user-data templates).
cluster:
  type: ""             # "kubeadm", "rke2", or "eks-hybrid" — selects the built-in user-data template
  controllerIP: ""     # Internal IP of controller node (kubeadm/rke2)
  joinToken: ""        # Cluster join token (kubeadm/rke2)
  # EKS hybrid settings (required when cluster.type=eks-hybrid):
  eksClusterName: ""           # EKS cluster name
  eksRegion: ""                # AWS region for EKS
  eksGatewayIP: ""             # Lambda VPC IP of gateway node
  eksVPCCIDR: ""               # AWS VPC CIDR for static route
  eksK8sVersion: "1.31"        # Kubernetes version for nodeadm
  eksHybridNodesRoleARN: ""    # IAM role ARN for hybrid nodes

# Lambda API token Secret. Set create=true to have the chart manage the Secret.
secret:
  create: false
  token: ""

# LambdaNodeClass. Set enabled=true to create a LambdaNodeClass via the chart.
nodeClass:
  enabled: false
  name: "default"
  region: ""
  instanceType: ""
  image:
    family: ""
  sshKeyNames: []
  tags: {}
  userData: ""         # Override built-in user-data (empty = use cluster.type template)

# NodePool. Set enabled=true to create a NodePool via the chart.
nodePool:
  enabled: false
  name: "default"
  instanceTypes: []    # e.g. ["gpu_1x_gh200"]
  architecture: ""     # e.g. "arm64"
  startupTaints:       # Taints applied during node initialization, removed by external agents
    - key: node.cilium.io/agent-not-ready
      value: "true"
      effect: NoSchedule
  limits:
    nodes: 1
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60m
