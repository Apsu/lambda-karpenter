apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lambdanodeclasses.karpenter.lambda.cloud
spec:
  group: karpenter.lambda.cloud
  scope: Cluster
  names:
    kind: LambdaNodeClass
    plural: lambdanodeclasses
    singular: lambdanodeclass
    shortNames:
      - lnc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - region
                - instanceType
              properties:
                region:
                  type: string
                instanceType:
                  type: string
                instanceTypeSelector:
                  type: array
                  items:
                    type: string
                image:
                  type: object
                  properties:
                    id:
                      type: string
                    family:
                      type: string
                sshKeyNames:
                  type: array
                  items:
                    type: string
                publicIP:
                  type: boolean
                pool:
                  type: string
                firewallRulesetIDs:
                  type: array
                  items:
                    type: string
                tags:
                  type: object
                  additionalProperties:
                    type: string
                userData:
                  type: string
            status:
              type: object
              properties:
                resolvedImageID:
                  type: string
                resolvedImageFamily:
                  type: string
                lastValidatedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
