apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: eks-hybrid
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.lambda.cloud
        kind: LambdaNodeClass
        name: eks-hybrid
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      # Cilium adds this taint until its agent is ready on the node.
      # Declaring it as a startupTaint tells Karpenter to filter it during
      # scheduling simulation (preventing duplicate NodeClaims) and wait for
      # Cilium to remove it before marking the node Initialized.
      startupTaints:
        - key: node.cilium.io/agent-not-ready
          value: "true"
          effect: NoSchedule
  limits:
    nodes: 2
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60m
