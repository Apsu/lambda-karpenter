apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: eks-hybrid
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.lambda.cloud
        kind: LambdaNodeClass
        name: eks-hybrid
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  limits:
    nodes: 2
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60m
