# Example values override for EKS hybrid cluster type.
# Usage: helm install lambda-karpenter charts/lambda-karpenter -f examples/eks-hybrid/values.yaml
#
# SSM activations are created dynamically by the provider (per-node, single-use).
# The provider's ServiceAccount needs IRSA/Pod Identity mapped to an IAM role
# with ssm:CreateActivation, ssm:DeleteActivation, and iam:PassRole.

config:
  clusterName: my-eks-cluster
  apiTokenSecret:
    name: lambda-api-token

cluster:
  type: eks-hybrid
  eksClusterName: my-eks-cluster
  eksRegion: us-west-2
  eksGatewayIP: ""             # Lambda VPC IP of gateway node (for worker bootstrap static route)
  eksVPCCIDR: "172.31.0.0/16"  # AWS VPC CIDR (for worker bootstrap static route)
  eksK8sVersion: "1.31"        # Kubernetes version for nodeadm
  eksHybridNodesRoleARN: ""    # IAM role ARN for hybrid nodes (ssm:CreateActivation)

nodeClass:
  enabled: true
  name: default
  region: us-east-3
  sshKeyNames:
    - my-key
  image:
    family: lambda-stack-24-04
  instanceTypeSelector:
    - gpu_1x_gh200

nodePool:
  enabled: true
  name: default
  startupTaints:
    - key: node.cilium.io/agent-not-ready
      value: "true"
      effect: NoSchedule
  limits:
    nodes: 2
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60m
