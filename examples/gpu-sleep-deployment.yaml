apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-sleep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-sleep
  template:
    metadata:
      labels:
        app: gpu-sleep
    spec:
      restartPolicy: Always
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: gpu-sleep
          image: ubuntu:22.04
          command: ["bash", "-lc", "sleep 3600"]
          resources:
            limits:
              nvidia.com/gpu: 1
