apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gh200-pool-static
spec:
  replicas: 1
  template:
    spec:
      nodeClassRef:
        group: karpenter.lambda.cloud
        kind: LambdaNodeClass
        name: lambda-gh200
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60m
  limits:
    nodes: 1
